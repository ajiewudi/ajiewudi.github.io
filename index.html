<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给特别的你</title>
    <style>
        /* --- 全局设置 --- */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        /* --- 背景图设置 --- */
        body {
            /* 这里设置背景图，叠加一层半透明白色让文字更清晰 */
            background: linear-gradient(rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.3)), 
                        url('images/bg.jpg') no-repeat center center fixed;
            background-size: cover; /* 让图片铺满屏幕 */
        }

        /* --- 漂浮图片区域 --- */
        #floating-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; 
        }

        .float-img {
            position: absolute; opacity: 0.9; 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.5s ease;
            max-width: 200px; max-height: 200px;
            object-fit: cover;
            border: 3px solid #fff; /* 给图片加个白边框，像拍立得 */
        }

        /* --- 左侧按钮 --- */
        .sidebar {
            position: fixed; left: 20px; top: 100px;
            display: flex; flex-direction: column; gap: 20px; z-index: 100; 
        }

        .cute-btn {
            background-color: rgba(255, 183, 178, 0.9); /* 半透明红 */
            backdrop-filter: blur(5px);
            color: white; border: none; padding: 15px 25px;
            border-radius: 20px; font-size: 16px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .cute-btn:hover { transform: scale(1.05); background-color: #ff9e99; }

        /* --- 弹窗样式 --- */
        #modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(3px); /* 背景模糊更高级 */
            z-index: 200; justify-content: center; align-items: center;
        }

        .letter-paper {
            background: #fffdf0; width: 85%; max-width: 500px;
            padding: 40px; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            max-height: 80vh; overflow-y: auto; /* 内容太长可滚动 */
        }

        .letter-content { font-size: 17px; color: #444; min-height: 100px; white-space: pre-wrap; line-height: 1.8; }
        .letter-date { text-align: right; font-size: 13px; color: #888; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;}
        
        .letter-controls { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .ctrl-btn { background: #8ec5fc; border: none; padding: 8px 16px; border-radius: 20px; color: white; cursor: pointer; font-size: 14px;}
        .ctrl-btn:disabled { background: #e0e0e0; cursor: not-allowed; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #ccc; }

        /* --- 回信区域 --- */
        #reply-area { display: none; margin-top: 20px; background: #fafafa; padding: 15px; border-radius: 8px; }
        #reply-input { width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 4px; padding: 10px; box-sizing: border-box; font-family: inherit; resize: none; }
    </style>
</head>
<body>

    <div id="floating-container"></div>

    <div class="sidebar">
        <button class="cute-btn" onclick="openLetter()">🕊️ 飞鸽传信</button>
        <button class="cute-btn" onclick="triggerUpload()">📷 提交图片</button>
    </div>

    <!-- 隐藏的文件输入 (关键修改：添加 name="attachment" 并绑定新函数) -->
    <input type="file" id="file-input" name="attachment" accept="image/*" style="display: none;" onchange="handleImageUpload(this.files)">

    <!-- 弹窗 -->
    <div id="modal-overlay">
        <div class="letter-paper">
            <div class="close-btn" onclick="closeLetter()">×</div>
            
            <div id="letter-display-area">
                <div class="letter-content" id="content-text">正在从云端获取信件...</div>
                <div class="letter-date" id="content-date">...</div>
            </div>

            <!-- 回信表单 -->
            <form id="reply-form" onsubmit="handleReplySubmit(event)">
                <div id="reply-area">
                    <p style="font-size: 14px; color: #888; margin:0 0 5px 0;">回信：</p>
                    <textarea id="reply-input" name="message" placeholder="写下你想说的话...（点击发送后我会收到邮件）" required></textarea>
                    <!-- 隐藏字段 -->
                    <input type="hidden" id="reply-subject" name="subject" value="来自网页的新回信">
                    <button type="submit" class="ctrl-btn" style="margin-top: 10px; background-color: #ffb7b2; width: 100%;">发送回信</button>
                </div>
            </form>

            <div class="letter-controls">
                <button class="ctrl-btn" id="prev-btn" onclick="changeLetter(-1)">上一封</button>
                <button class="ctrl-btn" style="background-color: #ff9e99;" onclick="toggleReplyBox()">💌 写回信</button>
                <button class="ctrl-btn" id="next-btn" onclick="changeLetter(1)">下一封</button>
            </div>
        </div>
    </div>

    <script>
        // ================= 配置区域 (请修改这里!) =================
        // ================= 配置区域 (已改为手动模式) =================
        const config = {
            githubUsername: 'ajiewudi',
            repoName: 'ajiewudi.github.io',
            pushPlusToken: '8a3ba3a0fcdb475f8c259e54686a838e',
            
            // 【关键修改点 1】：在这里手动列出你的图片文件名
            // 只需要列出 images 文件夹下的文件名（排除 bg.jpg）
            imageFiles: [
                '0aff9b531b54f10e3dc15bde993e513.jpg',
                '0dde9ac341c847eb0cc7cf5d17b3421e.jpg',
                '3712eeaf3c63cb36b5c08e5de0f98ef.jpg',
                '417b2724c977e2f05c7b55d5f852e94.jpg',
                '53f5a8b540ff345ea22a971754778b79.jpg',
                '60303754f74f74f509f01fa33bc4c603e25.jpg',
                '6715dd696bcda12bc342a3689a32989b9.jpg',
                '6f78972ce5019c8c55f00916320bed51.jpg',
                '6fd84426a7ecb188a54c5189dd346128.jpg',
                '867344dcbd887959a934b3187ca730d5.jpg',
                'a69f6ecae3dd94782baa644ea9207aab.jpg',
                'aadd09719d474469169e18495f931901.jpg',
                'b6835640762607e942ac97d3545da1a1.jpg',
                'e64f2c4918ef0b853169e991bd1b3586.jpg',
                'e87dee82ab73aaecee4a66a9f6fd4f09.jpg'
            ],

            // 【关键修改点 2】：在这里手动列出你的信件文件名
            // 确保这些文件在 letters 文件夹下
            letterFiles: [
                '1.txt',
                '2.txt'
            ]
        };
        // ========================================================

        let letters = []; 
        let currentLetterIndex = 0;

        window.onload = function() {
            renderStaticImages(); // 改用静态加载
            loadLetters();        // 改用静态读取
        };

        // --- 1. 静态加载图片 (不再请求 API) ---
        function renderStaticImages() {
            const container = document.getElementById('floating-container');
            config.imageFiles.forEach(fileName => {
                // 直接拼接路径
                const url = `images/${fileName}`;
                createFloatingImage(url);
            });
        }

        function createFloatingImage(url) {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'float-img';
            document.getElementById('floating-container').appendChild(img);
            img.onload = () => animateElement(img);
        }

        function animateElement(el) {
            const startX = Math.random() * (window.innerWidth - 100);
            const startY = Math.random() * (window.innerHeight - 100);
            el.style.left = startX + 'px'; el.style.top = startY + 'px';
            let vx = (Math.random() - 0.5) * 1; let vy = (Math.random() - 0.5) * 1;

            function move() {
                let rect = el.getBoundingClientRect();
                let x = parseFloat(el.style.left); let y = parseFloat(el.style.top);
                if (rect.left<=0 || rect.right>=window.innerWidth) vx*=-1;
                if (rect.top<=0 || rect.bottom>=window.innerHeight) vy*=-1;
                el.style.left = (x+vx)+'px'; el.style.top = (y+vy)+'px';
                requestAnimationFrame(move);
            }
            move();
        }

        // --- 2. 静态读取信件 (不再请求文件夹列表 API) ---
        async function loadLetters() {
            const loadedLetters = [];
            
            for (const fileName of config.letterFiles) {
                try {
                    // 直接根据文件名请求内容
                    const res = await fetch(`letters/${fileName}`);
                    if (!res.ok) continue;
                    const text = await res.text();
                    
                    const splitIndex = text.indexOf('\n');
                    let dateStr = "未知日期";
                    let bodyStr = text;
                    
                    if (splitIndex !== -1) {
                        dateStr = text.substring(0, splitIndex).trim();
                        bodyStr = text.substring(splitIndex + 1).trim();
                    }
                    loadedLetters.push({ date: dateStr, text: bodyStr, fileName: fileName });
                } catch (err) {
                    console.log(`加载信件 ${fileName} 失败`);
                }
            }

            if (loadedLetters.length > 0) {
                letters = loadedLetters;
            } else {
                letters = [{ date: "系统提示", text: "没有找到信件，请检查文件名是否正确。" }];
            }
        }

        // --- 3. 交互逻辑 (保持不变) ---
        const modal = document.getElementById('modal-overlay');
        const contentText = document.getElementById('content-text');
        const contentDate = document.getElementById('content-date');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const replyArea = document.getElementById('reply-area');

        function openLetter() {
            modal.style.display = 'flex';
            if (letters.length > 0) renderLetter();
        }
        function closeLetter() { modal.style.display = 'none'; replyArea.style.display = 'none'; }
        
        function renderLetter() {
            const l = letters[currentLetterIndex];
            let finalContent = l.text;
            const replyKey = 'reply_to_' + l.fileName;
            const mySavedReply = localStorage.getItem(replyKey);

            if (mySavedReply) {
                finalContent += `\n\n\n─────── ( 你的回信 ) ───────\n\n${mySavedReply}`;
                document.getElementById('reply-area').style.display = 'none';
            }

            contentText.textContent = finalContent;
            contentDate.textContent = l.date;
            
            prevBtn.disabled = currentLetterIndex === 0;
            nextBtn.disabled = currentLetterIndex === letters.length - 1;
        }

        function changeLetter(step) {
            currentLetterIndex += step;
            renderLetter();
            replyArea.style.display = 'none';
        }

        function toggleReplyBox() {
            replyArea.style.display = (replyArea.style.display === 'block') ? 'none' : 'block';
        }

        // --- 4. 处理回信发送 (保持不变) ---
        function handleReplySubmit(e) {
            e.preventDefault(); 
            const messageInput = document.getElementById('reply-input');
            const replyText = messageInput.value; 
            const submitBtn = document.querySelector('#reply-form button[type="submit"]');
            const currentLetter = letters[currentLetterIndex]; 

            if (!replyText.trim()) {
                alert("写点什么再发嘛~ 🥺");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "正在飞奔向你...";

            const combinedContent = 
                `📅 信件日期：${currentLetter.date}\n` +
                `📄 文件名：${currentLetter.fileName}\n\n` +
                `📝 【信件原文】：\n${currentLetter.text}\n\n` +
                `------------------------------------\n` +
                `💌 【TA的回信】：\n${replyText}`;

            const pushData = {
                token: config.pushPlusToken,
                title: `💌 收到新的回信！来自 [${currentLetter.date}]`,
                content: combinedContent, 
                template: 'txt' 
            };

            fetch('https://www.pushplus.plus/send', { // 注意这里加了 https
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(pushData)
            })
            .then(data => {
                localStorage.setItem('reply_to_' + currentLetter.fileName, replyText);
                renderLetter();
                alert("收到啦！你的回信已经和我的信融为一体了 ❤️");
            })
            .catch(error => {
                alert("虽然网络有点小波动，但回信我已经记下了！");
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = "发送回信";
                messageInput.value = ""; 
            });
        }

        // --- 5. 图片上传逻辑 (保持不变) ---
        function triggerUpload() { document.getElementById('file-input').click(); }

        function handleImageUpload(files) {
            if (!files.length) return;
            const file = files[0]; 
            const submitBtn = document.querySelector('.sidebar button:nth-child(2)');

            const reader = new FileReader();
            reader.onload = function(e) { createFloatingImage(e.target.result); };
            reader.readAsDataURL(file);

            submitBtn.disabled = true;
            submitBtn.innerText = "正在上传...";

            compressImage(file, 0.7, function(compressedBlob) {
                const formData = new FormData();
                const myEmail = "3055392767@qq.com";

                formData.append("email", myEmail); 
                formData.append("_subject", "📷 网页收到的新照片");
                formData.append("attachment", compressedBlob, "photo.jpg"); 

                fetch(`https://formsubmit.co/${myEmail}`, {
                    method: "POST",
                    body: formData
                })
                .then(() => alert("照片已成功飞入相册！"))
                .finally(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "📷 提交图片";
                });
            });
        }

        function compressImage(file, quality, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width; let height = img.height;
                    const maxSize = 1024;
                    if (width > height && width > maxSize) { height *= maxSize / width; width = maxSize; }
                    else if (height > maxSize) { width *= maxSize / height; height = maxSize; }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob(blob => callback(blob), 'image/jpeg', quality);
                }
            }
        }
