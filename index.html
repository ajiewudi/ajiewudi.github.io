<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给特别的你 - 专属纪念站</title>
    <!-- 引入炫酷图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #ffb7b2;
            --hover-pink: #ff9e99;
            --bg-cream: #fffdf6;
            --text-dark: #4a4a4a;
            --accent-blue: #b5e2fa;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-cream);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-dark); overflow: hidden;
        }

        /* --- 居中导航栏 --- */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 65px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .nav-container { display: flex; align-items: center; gap: 20px; }
        .nav-logo { font-size: 16px; font-weight: bold; text-decoration: none; color: var(--text-dark); margin-right: 15px; }
        .nav-logo i { color: var(--primary-pink); }
        .nav-btn {
            background: none; border: none; padding: 10px 18px; font-size: 14px;
            color: var(--text-dark); cursor: pointer; border-radius: 20px;
            transition: all 0.3s; display: flex; align-items: center; gap: 6px;
        }
        .nav-btn:hover, .nav-btn.active { background-color: var(--primary-pink); color: white; }

        /* --- 主视图区域 --- */
        .main-container { margin-top: 65px; height: calc(100vh - 65px); width: 100%; position: relative; }
        .view-section {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; padding: 30px; overflow-y: auto;
        }
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }

        /* --- 首页 纯净视觉 --- */
        .hero-view {
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.1)), url('images/bg.jpg') no-repeat center center;
            background-size: cover; height: 100%;
        }
        .hero-box {
            text-align: center; background: rgba(255, 255, 255, 0.88);
            padding: 50px 60px; border-radius: 24px; max-width: 600px;
            backdrop-filter: blur(8px); box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        /* --- ① 时光相册 左右双栏布局 --- */
        .album-layout { display: flex; gap: 25px; height: 100%; }
        .album-sidebar {
            width: 240px; background: white; border-radius: 16px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column;
        }
        .category-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; height: 100%; }
        .category-item {
            padding: 12px 15px; border-radius: 10px; cursor: pointer; font-size: 13px;
            transition: 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .category-item:hover, .category-item.active { background-color: #fff0f0; color: var(--hover-pink); font-weight: bold; }
        
        .album-main { flex: 1; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); overflow-y: auto; }
        .day-group { margin-bottom: 30px; }
        .day-title { font-size: 15px; font-weight: bold; color: #888; border-bottom: 1px solid #f5f5f5; padding-bottom: 8px; margin-bottom: 15px; display: flex; align-items: center; gap: 6px; }
        .day-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .photo-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .photo-item:hover img { transform: scale(1.06); }

        /* --- ② 全新改版：回忆轴（双栏对齐）样式 --- */
        .timeline-wrapper { max-width: 1000px; margin: 0 auto; position: relative; padding: 20px 0; }
        /* 居中的时间轴核心线 */
        .timeline-wrapper::before { 
            content: ''; position: absolute; left: 50%; top: 0; width: 2px; height: 100%; 
            background: #eddcd2; transform: translateX(-50%); 
        }
        
        /* 回忆轴单行容器 */
        .timeline-row { display: flex; width: 100%; margin-bottom: 40px; position: relative; align-items: flex-start; }
        
        /* 轴上的居中粉色爱心交汇点 */
        .timeline-dot { 
            position: absolute; left: 50%; top: 20px; transform: translateX(-50%); 
            background: var(--bg-cream); color: var(--primary-pink); 
            width: 24px; height: 24px; border-radius: 50%; text-align: center; 
            line-height: 24px; font-size: 12px; z-index: 10; box-shadow: 0 0 0 4px var(--bg-cream);
        }
        
        /* 左栏：照片生态区 */
        .timeline-left-col { width: 50%; padding-right: 40px; display: flex; flex-direction: column; align-items: flex-end; }
        /* 右栏：文字卡片生态区 */
        .timeline-right-col { width: 50%; padding-left: 40px; display: flex; flex-direction: column; align-items: flex-start; }
        
        /* 左侧时间对齐标题 */
        .timeline-row-date { font-size: 16px; font-weight: bold; color: var(--hover-pink); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        
        /* 左侧对齐的小型相册网格 */
        .timeline-mini-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; width: 100%; max-width: 380px; }
        .timeline-mini-photo { aspect-ratio: 1; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.06); cursor: pointer; }
        .timeline-mini-photo img { width: 100%; height: 100%; object-fit: cover; transition: 0.2s; }
        .timeline-mini-photo:hover img { transform: scale(1.05); }

        /* 右侧对齐的卡片栈 */
        .timeline-text-stack { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 420px; }
        .node-card { background: white; padding: 20px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); width: 100%; border: 1px solid #f9f9f9; }
        .node-card.clickable-letter:hover { cursor: pointer; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,183,178,0.15); border: 1px solid rgba(255,183,178,0.4); }
        .node-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .node-tag-group { display: flex; align-items: center; gap: 8px; }
        .node-tag { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .tag-memo { background: #e8f5e9; color: #2e7d32; }
        .tag-letter { background: #fff3e0; color: #ef6c00; }
        .node-date { font-size: 12px; color: #aaa; }
        .node-body { font-size: 14px; line-height: 1.6; color: #444; white-space: pre-wrap; }
        
        /* 删除按钮 */
        .btn-delete-memo { background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; transition: color 0.2s; padding: 0 5px; }
        .btn-delete-memo:hover { color: #eb5757; }
        
        .top-action-bar { display: flex; justify-content: flex-end; gap: 12px; max-width: 1000px; margin: 0 auto 20px auto; }
        .action-btn-mini { padding: 8px 16px; border-radius: 20px; border: none; font-size: 13px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* --- ③ 飞鸽传信独立设计 --- */
        .letter-write-box { max-width: 600px; margin: 20px auto; background: #fffdf2; padding: 40px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); border: 1px solid #f3eedb; }
        .letter-textarea { width: 100%; height: 280px; background: transparent; border: none; resize: none; font-family: inherit; font-size: 15px; line-height: 1.8; color: #444; outline: none; }
        
        /* 闪烁高亮动效 */
        @keyframes highlightPulse {
            0% { background-color: white; }
            30% { background-color: #fff0f0; box-shadow: 0 0 15px rgba(255,183,178,0.6); }
            100% { background-color: white; }
        }
        .target-highlight { animation: highlightPulse 1.5s ease-out; }

        /* --- 弹窗组件 --- */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); z-index: 2000; justify-content: center; align-items: center; }
        .dialog-window { background: white; width: 90%; max-width: 420px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .dialog-window h3 { margin-top: 0; font-size: 16px; }
        .dialog-group { margin-bottom: 15px; }
        .dialog-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        .dialog-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        
        input[type="file"] { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 极简响应式适配：屏幕过小时自动转为单栏 */
        @media (max-width: 768px) {
            .timeline-wrapper::before { left: 20px; transform: none; }
            .timeline-dot { left: 20px; transform: translateX(-50%); top: 15px; }
            .timeline-row { flex-direction: column; padding-left: 45px; }
            .timeline-left-col { width: 100%; padding-right: 0; align-items: flex-start; margin-bottom: 15px; }
            .timeline-right-col { width: 100%; padding-left: 0; }
            .timeline-mini-grid, .timeline-text-stack { max-width: 100%; }
        }
    </style>
</head>
<body>

    <!-- 居中导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo" onclick="switchView('home')"><i class="fa-solid fa-heart"></i> 专属空间</a>
            <button class="nav-btn" id="btn-nav-gallery" onclick="switchView('gallery')"><i class="fa-solid fa-images"></i> 时光相册</button>
            <button class="nav-btn" id="btn-nav-timeline" onclick="switchView('timeline')"><i class="fa-solid fa-timeline"></i> 回忆轴</button>
            <button class="nav-btn" id="btn-nav-mail" onclick="switchView('mail')"><i class="fa-solid fa-paper-plane"></i> 飞鸽传信</button>
            <button class="nav-btn" id="btn-nav-upload" onclick="triggerUpload()"><i class="fa-solid fa-cloud-arrow-up"></i> 提交新照片</button>
        </div>
    </nav>

    <!-- 主视图区 -->
    <div class="main-container">
        
        <!-- 首页视图 -->
        <section id="view-home" class="view-section hero-view active">
            <div class="hero-box">
                <h1 style="font-size: 28px; margin-bottom: 15px;">遇见你，是最美好的时光</h1>
                <p style="font-size: 15px; color: #666; line-height: 1.8;">所有的浪漫和琐碎都在顶部收纳，随时点击切换。</p>
            </div>
        </section>

        <!-- ① 时光相册视图 -->
        <section id="view-gallery" class="view-section">
            <div class="album-layout">
                <div class="album-sidebar">
                    <div class="category-list" id="album-tabs-container">
                        <!-- 动态载入固定相册标签 -->
                    </div>
                </div>
                <div class="album-main" id="album-photos-container">
                    <!-- 动态载入数据 -->
                </div>
            </div>
        </section>

        <!-- ② 回忆轴视图（全面升级为照片与文字左右对照排版） -->
        <section id="view-timeline" class="view-section">
            <div class="top-action-bar">
                <button class="action-btn-mini" style="background: #e8f5e9; color: #2e7d32;" onclick="openMemoDialog()">
                    <i class="fa-solid fa-pen-fancy"></i> 留言
                </button>
                <button class="action-btn-mini" style="background: #fff3e0; color: #ef6c00;" onclick="switchView('mail')">
                    <i class="fa-solid fa-envelope-open-text"></i> 写信
                </button>
            </div>
            <div class="timeline-wrapper" id="timeline-flow-container">
                <!-- 动态混合载入：轴左边图片，轴右边文字 -->
            </div>
        </section>

        <!-- ③ 飞鸽传信视图 -->
        <section id="view-mail" class="view-section">
            <div class="timeline-box" style="margin-bottom: 30px;" id="mail-flow-container">
                <!-- 纯信件流 -->
            </div>
            <div class="letter-write-box">
                <h3 style="margin-top:0; font-size:16px; color:#8a7a5f; border-bottom:1px dashed #eddcd2; padding-bottom:10px;"><i class="fa-solid fa-feather"></i> 发送信件</h3>
                <form id="mail-form" onsubmit="handleSendLetter(event)">
                    <textarea class="letter-textarea" id="letter-input-content" placeholder="展信佳：&#10;在这里写下你想对TA长篇大论的话..." required></textarea>
                    <button type="submit" id="letter-submit-btn" class="action-btn-mini" style="width:100%; background:var(--primary-pink); color:white; justify-content:center; padding:12px;">寄出信件</button>
                </form>
            </div>
        </section>

    </div>

    <!-- 隐藏的图片接受域 -->
    <input type="file" id="file-input" name="attachment" accept="image/*" onchange="handleImageUpload(this.files)">

    <!-- 通用弹窗组件容器 -->
    <div id="modal-overlay">
        <!-- 回忆轴短留言弹窗 -->
        <div class="dialog-window" id="dlg-create-memo" style="display:none;">
            <h3>发布新留言</h3>
            <div class="dialog-group">
                <label>选择留言日期</label>
                <input type="date" id="input-memo-date" class="dialog-input">
            </div>
            <div class="dialog-group">
                <label>留言内容 (适合几句话的碎碎念)</label>
                <textarea id="input-memo-content" class="dialog-input" style="height:100px; resize:none;" placeholder="今天想说的是..."></textarea>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
                <button class="action-btn-mini" id="memo-cancel-btn" style="background:#eee;" onclick="closeDialog()">取消</button>
                <button class="action-btn-mini" id="memo-submit-btn" style="background:var(--primary-pink); color:white;" onclick="submitCreateMemo()">发布</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            pushPlusToken: '8a3ba3a0fcdb475f8c259e54686a838e',
            formsubmitEmail: "3055392767@qq.com"
        };

        // ① 固定的相册分类单
        const albums = ["全部", "25年3月", "25年4月", "25年6月", "25年8月", "25年10月", "25年11月", "25年12月", "26年1月"];
        let currentAlbum = "全部";

        // ② 实际物理存储路径的数据映射库
        let photoDatabase = [
            { url: "images/2026年1月/1月1日00:00.jpg", album: "26年1月", date: "2026-01-01" },
            { url: "images/25年10月/10月22日19:47.jpg", album: "25年10月", date: "2025-10-22" },
            { url: "images/25年11月/11月3日00:57.jpg", album: "25年11月", date: "2025-11-03" },
            { url: "images/25年11月/11月7日14:14.jpg", album: "25年11月", date: "2025-11-07" },
            { url: "images/25年12月/12月18日00:15.jpg", album: "25年12月", date: "2025-12-18" },
            { url: "images/25年3月/3月15日20:13.jpg", album: "25年3月", date: "2025-03-15" },
            { url: "images/25年4月/4月17日10:30.jpg", album: "25年4月", date: "2025-04-17" },
            { url: "images/25年6月/6月17日01:11.jpg", album: "25年6月", date: "2025-06-17" },
            { url: "images/25年6月/6月22日23:43.jpg", album: "25年6月", date: "2025-06-22" },
            { url: "images/25年6月/6月22日23:49.jpg", album: "25年6月", date: "2025-06-22" },
            { url: "images/25年6月/6月22日23:52.jpg", album: "25年6月", date: "2025-06-22" },
            { url: "images/25年6月/6月23日00:59.jpg", album: "25年6月", date: "2025-06-23" },
            { url: "images/25年6月/6月5日17:33.jpg", album: "25年6月", date: "2025-06-05" },
            { url: "images/25年8月/8月10日23:27.jpg", album: "25年8月", date: "2025-08-10" },
            { url: "images/25年8月/8月10日23:50.jpg", album: "25年8月", date: "2025-08-10" }
        ];

        // 真实静态信件文件
        const serverLetterFiles = [
            { path: "letters/25年12月/12月25日00:17.txt", date: "2025-12-25" },
            { path: "letters/25年12月/12月25日12:00.txt", date: "2025-12-25" }
        ];

        // 真实静态留言文件
        const serverMessageFiles = [
            { path: "messages/26年7月/7月11日12:14.txt" }
        ];

        // 混合数据池
        let mixedTimelineData = [];

        window.onload = async function() {
            if(localStorage.getItem('custom_photos_v2')) photoDatabase = JSON.parse(localStorage.getItem('custom_photos_v2'));
            if(localStorage.getItem('custom_timeline_v2')) mixedTimelineData = JSON.parse(localStorage.getItem('custom_timeline_v2'));

            await loadLettersFromServer();
            await loadMessagesFromServer();

            renderAlbumTabs();
            renderPhotos();
            renderTimeline();
            renderMailFlow();
        };

        // 从服务器读取静态 letters 文件
        async function loadLettersFromServer() {
            for (const fileInfo of serverLetterFiles) {
                try {
                    const res = await fetch(`./${fileInfo.path}`);
                    if (!res.ok) continue;
                    const text = await res.text();
                    
                    const isExist = mixedTimelineData.some(item => item.serverPath === fileInfo.path);
                    if (!isExist) {
                        mixedTimelineData.push({
                            id: 'server-letter-' + fileInfo.path.replace(/\//g, '-').replace(/\./g, '-'), 
                            type: 'letter',
                            date: fileInfo.date,
                            content: text,
                            serverPath: fileInfo.path
                        });
                    }
                } catch (err) {
                    console.log(`加载信件 ${fileInfo.path} 失败`);
                }
            }
        }

        // 从服务器读取静态 messages 留言文件
        async function loadMessagesFromServer() {
            for (const fileInfo of serverMessageFiles) {
                try {
                    const res = await fetch(`./${fileInfo.path}`);
                    if (!res.ok) continue;
                    const text = await res.text();
                    
                    const isExist = mixedTimelineData.some(item => item.serverPath === fileInfo.path);
                    if (!isExist) {
                        const splitIndex = text.indexOf('\n');
                        let dateStr = "未知日期";
                        let bodyStr = text;
                        if (splitIndex !== -1) {
                            dateStr = text.substring(0, splitIndex).trim();
                            bodyStr = text.substring(splitIndex + 1).trim();
                        }

                        mixedTimelineData.push({
                            id: 'server-memo-' + fileInfo.path.replace(/\//g, '-').replace(/\./g, '-'),
                            type: 'memo',
                            date: dateStr,
                            content: bodyStr,
                            serverPath: fileInfo.path,
                            isStatic: true
                        });
                    }
                } catch (err) {
                    console.log(`加载静态留言 ${fileInfo.path} 失败`);
                }
            }
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            const targetView = document.getElementById('view-' + viewId);
            const targetBtn = document.getElementById('btn-nav-' + viewId);
            if(targetView) targetView.classList.add('active');
            if(targetBtn) targetBtn.classList.add('active');
        }

        // 回忆轴跳向信件位置导航器
        function navigateToLetter(letterId) {
            document.querySelectorAll('#mail-flow-container .node-card').forEach(card => {
                card.classList.remove('target-highlight');
            });
            switchView('mail');
            setTimeout(() => {
                const targetDom = document.getElementById('dom-' + letterId);
                if (targetDom) {
                    targetDom.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    targetDom.classList.add('target-highlight');
                }
            }, 100);
        }

        // --- ① 时光相册逻辑核心 ---
        function renderAlbumTabs() {
            const container = document.getElementById('album-tabs-container');
            container.innerHTML = '';
            albums.forEach(name => {
                const item = document.createElement('div');
                item.className = `category-item ${currentAlbum === name ? 'active' : ''}`;
                item.innerHTML = `<span><i class="fa-regular fa-folder-open"></i> ${name}</span>`;
                item.onclick = () => { currentAlbum = name; renderAlbumTabs(); renderPhotos(); };
                container.appendChild(item);
            });
        }

        function renderPhotos() {
            const container = document.getElementById('album-photos-container');
            container.innerHTML = '';

            let filtered = photoDatabase;
            if(currentAlbum !== "全部") {
                filtered = photoDatabase.filter(p => p.album === currentAlbum);
            }

            if(filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center;color:#ccc;margin-top:40px;font-size:13px;">该相册内暂无影像记录</div>`;
                return;
            }

            const groups = {};
            filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(p => {
                if(!groups[p.date]) groups[p.date] = [];
                groups[p.date].push(p);
            });

            for(let date in groups) {
                const dayBox = document.createElement('div');
                dayBox.className = 'day-group';
                dayBox.innerHTML = `
                    <div class="day-title"><i class="fa-regular fa-calendar-check"></i> ${date}</div>
                    <div class="day-grid">
                        ${groups[date].map(p => `
                            <div class="photo-item">
                                <img src="${p.url}" alt="photo" onclick="window.open('${p.url}', '_blank')">
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(dayBox);
            }
        }

        // --- ② 全新深度重构：回忆轴（左边放相册图片，右边放信件留言，轴线居中） ---
        function renderTimeline() {
            const container = document.getElementById('timeline-flow-container');
            container.innerHTML = '';

            // 1. 抓取全局所有出现过的时间钥匙（把照片和文字的所有日期合并到一个池子里）
            const allDatesSet = new Set();
            photoDatabase.forEach(p => allDatesSet.add(p.date));
            mixedTimelineData.forEach(t => allDatesSet.add(t.date));

            // 转换为数组并按照时间从新到旧进行倒序排列
            const sortedDates = Array.from(allDatesSet).sort((a, b) => new Date(b) - new Date(a));

            if(sortedDates.length === 0) {
                container.innerHTML = `<div style="text-align:center;color:#ccc;margin-top:40px;font-size:13px;">回忆轴里空空如也</div>`;
                return;
            }

            // 2. 按天作为一行，进行两栏对齐渲染
            sortedDates.forEach(dateKey => {
                // 筛选出当天对应的照片组
                const dayPhotos = photoDatabase.filter(p => p.date === dateKey);
                // 筛选出当天对应的文字内容（留言或信件）
                const dayTexts = mixedTimelineData.filter(t => t.date === dateKey);

                // 创建一整行行元素
                const row = document.createElement('div');
                row.className = 'timeline-row';

                // 轴线上的中心定位红心
                const dot = document.createElement('div');
                dot.className = 'timeline-dot';
                dot.innerHTML = '♥';
                row.appendChild(dot);

                // --- 左栏：照片生态区 ---
                const leftCol = document.createElement('div');
                leftCol.className = 'timeline-left-col';
                
                let photosHtml = '';
                if(dayPhotos.length > 0) {
                    photosHtml = `
                        <div class="timeline-row-date"><i class="fa-regular fa-image"></i> ${dateKey}</div>
                        <div class="timeline-grid-wrapper">
                            <div class="timeline-grid-wrapper timeline-mini-grid">
                                ${dayPhotos.map(p => `
                                    <div class="timeline-mini-photo">
                                        <img src="${p.url}" alt="memory" onclick="window.open('${p.url}', '_blank')">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    // 当天如果没有照片，左侧留白或放个极简日期标签
                    photosHtml = `<div class="timeline-row-date" style="opacity:0.4;"><i class="fa-regular fa-calendar"></i> ${dateKey}</div>`;
                }
                leftCol.innerHTML = photosHtml;
                row.appendChild(leftCol);

                // --- 右栏：文字卡片生态区 ---
                const rightCol = document.createElement('div');
                rightCol.className = 'timeline-right-col';

                let textsHtml = '';
                if(dayTexts.length > 0) {
                    textsHtml = `<div class="timeline-text-stack">`;
                    // 当天可能有多条留言或信件，打包成垂直卡片栈
                    dayTexts.forEach(node => {
                        const isLetter = node.type === 'letter';
                        const displayContent = isLetter && node.content.length > 60 ? node.content.substring(0, 60) + "..." : node.content;
                        const deleteBtnHtml = (!isLetter && !node.isStatic) ? `<button class="btn-delete-memo" onclick="deleteMemo('${node.id}')" title="删除留言"><i class="fa-regular fa-trash-can"></i></button>` : '';
                        
                        const cardClass = isLetter ? 'node-card clickable-letter' : 'node-card';
                        const clickAction = isLetter ? `onclick="navigateToLetter('${node.id}')" ` : '';

                        textsHtml += `
                            <div class="${cardClass}" ${clickAction}>
                                <div class="node-header">
                                    <div class="node-tag-group">
                                        <span class="node-tag ${isLetter ? 'tag-letter' : 'tag-memo'}">${isLetter ? '💌 信件' : '💬 留言'}</span>
                                        ${deleteBtnHtml}
                                    </div>
                                </div>
                                <div class="node-body">${displayContent}</div>
                            </div>
                        `;
                    });
                    textsHtml += `</div>`;
                } else {
                    // 当天如果没有写文字，右侧留空
                    textsHtml = `<div style="min-height:20px;"></div>`;
                }
                rightCol.innerHTML = textsHtml;
                row.appendChild(rightCol);

                container.appendChild(row);
            });
        }

        function deleteMemo(id) {
            if(confirm("确定要删除这条留言吗？🥺")) {
                mixedTimelineData = mixedTimelineData.filter(item => item.id !== id);
                localStorage.setItem('custom_timeline_v2', JSON.stringify(mixedTimelineData));
                renderTimeline(); // 重新渲染混合轴
            }
        }

        // --- ③ 飞鸽传信独立流 ---
        function renderMailFlow() {
            const container = document.getElementById('mail-flow-container');
            container.innerHTML = '';
            const letters = mixedTimelineData.filter(n => n.type === 'letter');

            if(letters.length === 0) {
                container.innerHTML = `<div style="text-align:center;color:#ccc;font-size:13px;">信箱里空空的</div>`;
                return;
            }

            letters.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(l => {
                const card = document.createElement('div');
                card.className = 'timeline-node';
                card.innerHTML = `
                    <div class="node-card" id="dom-${l.id}" style="border-left: 3px solid var(--primary-pink); transition: background-color 0.5s;">
                        <div class="node-header">
                            <span class="node-tag tag-letter">💌 信件正文</span>
                            <span class="node-date">${l.date}</span>
                        </div>
                        <div class="node-body" style="font-size:15px; color:#333;">${l.content}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function handleSendLetter(e) {
            e.preventDefault();
            const textInput = document.getElementById('letter-input-content');
            const submitBtn = document.getElementById('letter-submit-btn');
            const content = textInput.value;

            if(!content.trim()) return;

            submitBtn.disabled = true;
            submitBtn.innerText = "正在通过飞鸽寄出...";

            const today = new Date().toISOString().split('T')[0];
            const newLetterNode = { id: 'letter-' + Date.now(), type: 'letter', date: today, content: content };

            fetch('https://www.pushplus.plus/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: config.pushPlusToken,
                    title: `💌 空间收到一封新信件！`,
                    content: `寄出日期：${today}\n\n内容详情：\n${content}`,
                    template: 'txt'
                })
            })
            .then(() => {
                mixedTimelineData.unshift(newLetterNode);
                localStorage.setItem('custom_timeline_v2', JSON.stringify(mixedTimelineData));
                renderTimeline();
                renderMailFlow();
                textInput.value = '';
                alert("长信已经安全寄出！❤️");
            })
            .catch(() => {
                mixedTimelineData.unshift(newLetterNode);
                localStorage.setItem('custom_timeline_v2', JSON.stringify(mixedTimelineData));
                renderTimeline();
                renderMailFlow();
                textInput.value = '';
                alert("网络有些小波动，但长信已离线存入本地空间！");
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = "寄出信件";
            });
        }

        function openDialog() { document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeDialog() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('dlg-create-memo').style.display = 'none';
        }

        function openMemoDialog() { 
            openDialog(); 
            document.getElementById('dlg-create-memo').style.display = 'block'; 
            document.getElementById('input-memo-date').value = new Date().toISOString().split('T')[0];
        }

        function submitCreateMemo() {
            const date = document.getElementById('input-memo-date').value;
            const content = document.getElementById('input-memo-content').value.trim();
            const submitBtn = document.getElementById('memo-submit-btn');
            const cancelBtn = document.getElementById('memo-cancel-btn');

            if(!content) { alert("留言内容填一下嘛~"); return; }

            submitBtn.disabled = true;
            submitBtn.innerText = "同步发送中...";
            cancelBtn.style.display = 'none';

            const newMemo = { id: 'memo-' + Date.now(), type: 'memo', date: date, content: content };

            fetch('https://www.pushplus.plus/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: config.pushPlusToken,
                    title: `💬 纪念站收到一条新留言！`,
                    content: `设定日期：${date}\n\n留言内容：\n${content}`,
                    template: 'txt'
                })
            })
            .then(() => {
                mixedTimelineData.unshift(newMemo);
                localStorage.setItem('custom_timeline_v2', JSON.stringify(mixedTimelineData));
                renderTimeline();
                document.getElementById('input-memo-content').value = '';
                closeDialog();
                alert("留言发布成功，微信通知已安全送达！✨");
            })
            .catch(() => {
                mixedTimelineData.unshift(newMemo);
                localStorage.setItem('custom_timeline_v2', JSON.stringify(mixedTimelineData));
                renderTimeline();
                document.getElementById('input-memo-content').value = '';
                closeDialog();
                alert("网络有轻微波动，留言已安全存入空间！");
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = "发布";
                cancelBtn.style.display = 'inline-block';
            });
        }

        // --- 图片上传管理 ---
        function triggerUpload() { document.getElementById('file-input').click(); }

        function handleImageUpload(files) {
            if (!files.length) return;
            const file = files[0];
            const navBtn = document.getElementById('btn-nav-upload');

            const reader = new FileReader();
            reader.onload = function(e) {
                const todayStr = new Date().toISOString().split('T')[0];
                const targetAlbum = currentAlbum === "全部" ? "26年1月" : currentAlbum;
                
                photoDatabase.unshift({ url: e.target.result, album: targetAlbum, date: todayStr });
                localStorage.setItem('custom_photos_v2', JSON.stringify(photoDatabase));
                renderPhotos();
                renderTimeline(); // 同步重刷回忆轴
                switchView('timeline'); // 自动跳到回忆轴看对齐的新动态
            };
            reader.readAsDataURL(file);

            navBtn.disabled = true;
            navBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 上传中...`;

            compressImage(file, 0.7, function(compressedBlob) {
                const formData = new FormData();
                formData.append("email", config.formsubmitEmail);
                formData.append("_subject", "📷 空间相册收到一张全新照片");
                formData.append("attachment", compressedBlob, "photo.jpg");

                fetch(`https://formsubmit.co/${config.formsubmitEmail}`, { method: "POST", body: formData })
                .then(() => alert("照片已通过邮件异步同步至云端归档！"))
                .finally(() => {
                    navBtn.disabled = false;
                    navBtn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> 提交新照片`;
                });
            });
        }

        function compressImage(file, quality, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width, height = img.height;
                    if (width > 1024) { height *= 1024 / width; width = 1024; }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob(blob => callback(blob), 'image/jpeg', quality);
                }
            }
        }
    </script>
